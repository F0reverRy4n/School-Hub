kind = "web"
previewPath = "/"
title = "Student Dashboard"
version = "1.0.0"
id = "artifacts/student-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25203
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/student-dashboard run dev"

[services.env]
PORT = "25203"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/student-dashboard", "run", "build"]
publicDir = "artifacts/student-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
